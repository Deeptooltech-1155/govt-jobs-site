name: Update Government Jobs

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-jobs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install feedparser requests

      - run: python scripts/fetch_jobs.py

      - run: |
          git config user.name "Jobs Bot"
          git config user.email "jobsbot@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "auto-update jobs"
          git push
